<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#fdb913;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f59e0b;stop-opacity:0.95" />
      <stop offset="70%" style="stop-color:#d97706;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer circle glow -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGrad)" opacity="0.95"/>
  
  <!-- Inner dark circle -->
  <circle cx="100" cy="100" r="85" fill="#0a0e27" opacity="0.95"/>
  
  <!-- Gold accent circle -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#fdb913" stroke-width="2" opacity="0.6"/>
  
  <!-- Dumbbell with enhanced styling -->
  <g filter="url(#shadow)">
    <!-- Left weight plates -->
    <g filter="url(#glow)">
      <rect x="22" y="78" width="18" height="44" rx="2" fill="#fdb913" opacity="0.95"/>
      <rect x="20" y="73" width="22" height="4" rx="1" fill="#f59e0b"/>
      <rect x="20" y="129" width="22" height="4" rx="1" fill="#f59e0b"/>
      
      <!-- Weight plate details -->
      <line x1="28" y1="78" x2="28" y2="122" stroke="#111827" stroke-width="1" opacity="0.4"/>
      <line x1="34" y1="78" x2="34" y2="122" stroke="#111827" stroke-width="1" opacity="0.4"/>
      
      <!-- Highlight -->
      <rect x="22" y="78" width="3" height="44" fill="white" opacity="0.15" rx="2"/>
    </g>
    
    <!-- Center bar -->
    <g filter="url(#glow)">
      <rect x="40" y="92" width="120" height="16" rx="8" fill="#d4af37" opacity="0.98"/>
      <rect x="40" y="92" width="120" height="4" fill="white" opacity="0.2" rx="8"/>
      <circle cx="100" cy="100" r="12" fill="#fdb913" opacity="0.3"/>
    </g>
    
    <!-- Right weight plates -->
    <g filter="url(#glow)">
      <rect x="160" y="78" width="18" height="44" rx="2" fill="#fdb913" opacity="0.95"/>
      <rect x="158" y="73" width="22" height="4" rx="1" fill="#f59e0b"/>
      <rect x="158" y="129" width="22" height="4" rx="1" fill="#f59e0b"/>
      
      <!-- Weight plate details -->
      <line x1="166" y1="78" x2="166" y2="122" stroke="#111827" stroke-width="1" opacity="0.4"/>
      <line x1="172" y1="78" x2="172" y2="122" stroke="#111827" stroke-width="1" opacity="0.4"/>
      
      <!-- Highlight -->
      <rect x="175" y="78" width="3" height="44" fill="white" opacity="0.15" rx="2"/>
    </g>
  </g>
  
  <!-- Text styling -->
  <text x="100" y="158" font-family="'Arial Black', Arial, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2.5" filter="url(#shadow)">IRON</text>
  <text x="100" y="175" font-family="'Arial Black', Arial, sans-serif" font-size="14" font-weight="700" fill="#fdb913" text-anchor="middle" letter-spacing="2">TEMPLE</text>
</svg>